name: Fetch intraday candles

# Manually-triggered data fetch for scalp backtesting. GitHub runners can
# reach Binance's public data mirror; the Claude sandbox cannot. Commits the
# CSV back to the branch the workflow was dispatched on.

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Trading pair"
        default: "BTCUSDT"
      interval:
        description: "Candle interval (1m/3m/5m/15m/30m/1h)"
        default: "1m"
      days:
        description: "Days of history"
        default: "30"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Fetch candles
        run: node fetch-binance-intraday.js "${{ inputs.symbol }}" "${{ inputs.interval }}" "${{ inputs.days }}"

      - name: Commit CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./*-binance.csv
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Intraday data: ${{ inputs.symbol }} ${{ inputs.interval }} ${{ inputs.days }}d"
          git push
