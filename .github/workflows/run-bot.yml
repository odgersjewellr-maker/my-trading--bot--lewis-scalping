      - name: Persist state back to repo
        run: |
          rm -f .env
          git config user.name "trading-bot"
          git config user.email "actions@users.noreply.github.com"
          for f in position-SOLUSDT-PROP.json trades-SOLUSDT-PROP.csv safety-check-log-SOLUSDT-PROP.json nkb-state-SOLUSDT-PROP.json portfolio-SOLUSDT-PROP.json prop-state-SOLUSDT-PROP.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "SOL-PROP run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i) — rebasing onto latest main..."
            git fetch origin main
            git rebase origin/main
            sleep $((i * 2))
          done
          echo "::error::git push failed after retries"
          exit 1

