      - run: npm install

      - name: Write .env
        run: |
          cat <<EOF > .env
          BITGET_API_KEY=${{ secrets.BITGET_API_KEY }}
          BITGET_SECRET_KEY=${{ secrets.BITGET_SECRET_KEY }}
          BITGET_PASSPHRASE=${{ secrets.BITGET_PASSPHRASE }}
          BITGET_BASE_URL=https://api.bitget.com
          TRADE_MODE=futures
          LEVERAGE=1
          PORTFOLIO_VALUE_USD=100000
          MAX_TRADES_PER_DAY=0
          MAX_TRADE_SIZE_USD=250000
          SYMBOL=SOLUSDT
          INSTANCE_ID=SOLUSDT-PROP
          TIMEFRAME=15m
          NKB_KERNEL=gaussian
          NKB_BAND_MULT=3.0
          NKB_BANDWIDTH=6.0
          NKB_ATR_STOP_MULT=1.0
          PAPER_TRADING=true
          PAPER_FEE_RATE=0.0003
          REGIME_GATE=markov
          PROP_MODE=true
          PROP_RISK_PCT=0.5
          PROP_TARGET_PCT=10
          PROP_MAX_DD_PCT=7
          PROP_DD_GUARD=0.9
          PROP_DAILY_LIMIT_PCT=4
          PROP_DAILY_GUARD=0.7
          PROP_LEV_CAP=2
          PROP_SWAP_RATE=0.0005
          PROP_DAY_RESET_MIN=30
