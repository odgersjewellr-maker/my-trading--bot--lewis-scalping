name: Run trading bot

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: run-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm install

      - name: Write .env
        run: |
          cat <<EOF > .env
          BITGET_API_KEY=${{ secrets.BITGET_API_KEY }}
          BITGET_SECRET_KEY=${{ secrets.BITGET_SECRET_KEY }}
          BITGET_PASSPHRASE=${{ secrets.BITGET_PASSPHRASE }}
          BITGET_BASE_URL=https://api.bitget.com
          TRADE_MODE=futures
          LEVERAGE=1
          TRADE_SIZE_PCT=80
          PORTFOLIO_VALUE_USD=640
          MAX_TRADES_PER_DAY=0
          SYMBOL=BTCUSDT
          TIMEFRAME=1m
          NKB_KERNEL=tricube
          PAPER_TRADING=true
          EOF

      - name: Run bot
        run: node bot.js

      - name: Persist state back to repo
        run: |
          rm -f .env
          git config user.name "trading-bot"
          git config user.email "actions@users.noreply.github.com"
          for f in position.json trades.csv safety-check-log.json nkb-state.json portfolio.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Bot run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i) — webhook likely committed concurrently. Rebasing onto latest main and retrying..."
            git fetch origin main
            git rebase origin/main
            sleep $((i * 2))
          done
          echo "::error::git push failed after retries"
          exit 1
