          TRADE_MODE=futures
          LEVERAGE=1
          PORTFOLIO_VALUE_USD=100000
          MAX_TRADES_PER_DAY=0
          MAX_TRADE_SIZE_USD=250000
          SYMBOL=SOLUSDT
          INSTANCE_ID=SOLUSDT-PROP
          TIMEFRAME=15m
          NKB_KERNEL=gaussian
          NKB_BAND_MULT=3.0
          NKB_BANDWIDTH=6.0
          NKB_ATR_STOP_MULT=1.0
          PAPER_TRADING=true
          PAPER_FEE_RATE=0.0008
          REGIME_GATE=markov
          PROP_MODE=true
