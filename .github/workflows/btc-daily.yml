name: BTC daily book

# TEMPORARILY REPURPOSED ON THIS BRANCH ONLY (claude/patent-trading-candles):
# dispatched here to fetch SOL + ETH history, because workflow_dispatch only
# registers workflows from the default branch. main's scheduled runs use
# main's copy of this file and are unaffected. Restored right after the
# data lands — see fetch-history.yml for the permanent workflow.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Fetch SOL and ETH daily history
        run: |
          node fetch-history.js SOLUSDT sol-daily-bitget.csv
          node fetch-history.js ETHUSDT eth-daily-bitget.csv

      - name: Commit CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sol-daily-bitget.csv eth-daily-bitget.csv
          git diff --cached --quiet || git commit -m "Add SOL + ETH daily history from BitGet (fetch-history workflow)"
          git push
