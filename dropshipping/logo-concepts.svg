<svg xmlns="http://www.w3.org/2000/svg" width="900" height="800" viewBox="0 0 900 800">
  <rect width="900" height="800" fill="#fafaf8"/>

  <!-- header -->
  <text x="450" y="52" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#8a8a85" letter-spacing="4">REVIVER — WORDMARK CONCEPTS</text>

  <!-- Concept 1: mirrored last R -->
  <rect x="60" y="90" width="780" height="190" rx="14" fill="#ffffff" stroke="#e6e6e2"/>
  <text x="450" y="205" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="72" fill="#1c1c1a" letter-spacing="6">REVIVE<tspan fill="#0d9488">Я</tspan></text>
  <text x="450" y="252" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#8a8a85" letter-spacing="1">1 — Your idea: last R mirrored, accent colour. Bold, instantly noticeable.</text>

  <!-- Concept 2: mirror axis through the I -->
  <rect x="60" y="310" width="780" height="200" rx="14" fill="#ffffff" stroke="#e6e6e2"/>
  <text x="418" y="425" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="72" fill="#1c1c1a" letter-spacing="6">REV</text>
  <rect x="438" y="368" width="10" height="62" rx="5" fill="#0d9488"/>
  <text x="468" y="425" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="72" fill="#a8a8a3" letter-spacing="6">VER</text>
  <line x1="443" y1="352" x2="443" y2="445" stroke="#0d9488" stroke-width="1" stroke-dasharray="3 4" opacity="0.5"/>
  <text x="450" y="482" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#8a8a85" letter-spacing="1">2 — The I as the mirror axis: right half is the "reflection". Subtler, more premium.</text>

  <!-- Concept 3: lowercase + both-ways arrow -->
  <rect x="60" y="540" width="780" height="200" rx="14" fill="#ffffff" stroke="#e6e6e2"/>
  <text x="450" y="645" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="64" fill="#1c1c1a" letter-spacing="10">reviver<tspan font-size="30" fill="#8a8a85" letter-spacing="2"> co.</tspan></text>
  <g stroke="#0d9488" stroke-width="4" stroke-linecap="round" fill="none">
    <line x1="300" y1="678" x2="580" y2="678"/>
    <polyline points="316,666 300,678 316,690"/>
    <polyline points="564,666 580,678 564,690"/>
  </g>
  <text x="450" y="722" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#8a8a85" letter-spacing="1">3 — Lowercase + reads-both-ways arrow. Friendly, works tiny (app icons, tags).</text>
</svg>
